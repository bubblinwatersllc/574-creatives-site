<!doctype html>
<html>
  <head>
    <title>Netlify Forms</title>
  </head>
  <body>
    <!--
      Static form definition so Netlify can detect "get-involved" at build time.
      The actual form lives in components/ContactForm.tsx and posts to "/".
    -->
    <form name="get-involved" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="interest" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="craft" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
